# Fly.io deployment (backend). Run `fly launch --dockerfile backend/Dockerfile`.
app = "stenoforge-api"
primary_region = "bom"   # Mumbai

[build]
  dockerfile = "backend/Dockerfile"

[env]
  ENV = "production"

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    port = 80
    handlers = ["http"]
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[[services.tcp_checks]]
  interval = "15s"
  timeout  = "2s"
  grace_period = "10s"

[[services.http_checks]]
  interval = "30s"
  timeout  = "5s"
  method = "get"
  path = "/health"
