# Render.com blueprint — one-click deploy for StenoForge AI
services:
  - type: web
    name: stenoforge-api
    env: python
    region: singapore        # closest to India at time of writing
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker -w 2 -b 0.0.0.0:$PORT app.main:app
    envVars:
      - key: ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: stenoforge-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://stenoforge.ai
      - key: AI_PROVIDER
        value: anthropic
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-5
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
    autoDeploy: true

  - type: web
    name: stenoforge-web
    env: static
    region: singapore
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://stenoforge-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: stenoforge-db
    plan: starter
    region: singapore
    databaseName: stenoforge
    user: stenoforge
